<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuck Investments Design Preview (Light)</title>
<style>
  :root {
    --bg: #cbcbcb;
    --fg: #d6fe2f;
    --accent: #11120f;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: IBM Plex Mono;
    --font-mono: Space Mono;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Fuck Investments</h1>
        <p>Fine art gallery website</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://fuck.investments/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/fuck-investments">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>IBM Plex Mono<br>Space Mono</p>
        <div class="eyebrow">Tags</div>
        <p class="small">glitches · arts&culture</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#cbcbcb"></div><div class="meta">#cbcbcb</div></div><div class="swatch"><div class="chip" style="background:#d6fe2f"></div><div class="meta">#d6fe2f</div></div><div class="swatch"><div class="chip" style="background:#11120f"></div><div class="meta">#11120f</div></div><div class="swatch"><div class="chip" style="background:#a9a9a9"></div><div class="meta">#a9a9a9</div></div><div class="swatch"><div class="chip" style="background:#ccd6a6"></div><div class="meta">#ccd6a6</div></div><div class="swatch"><div class="chip" style="background:#afcf2d"></div><div class="meta">#afcf2d</div></div><div class="swatch"><div class="chip" style="background:#d4f059"></div><div class="meta">#d4f059</div></div><div class="swatch"><div class="chip" style="background:#92ab28"></div><div class="meta">#92ab28</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Fuck Investments desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Fuck Investments mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
