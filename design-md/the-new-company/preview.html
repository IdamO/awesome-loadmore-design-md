<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The New Company Design Preview (Light)</title>
<style>
  :root {
    --bg: #e3d9cf;
    --fg: #252324;
    --accent: #655c55;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: NeueHaas;
    --font-mono: ui-monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>The New Company</h1>
        <p>Play around with gravity and draggable elements on this cheerful homepage.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://www.new.company">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/the-new-company">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>NeueHaas</p>
        <div class="eyebrow">Tags</div>
        <p class="small">portfolio</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#e3d9cf"></div><div class="meta">#e3d9cf</div></div><div class="swatch"><div class="chip" style="background:#252324"></div><div class="meta">#252324</div></div><div class="swatch"><div class="chip" style="background:#655c55"></div><div class="meta">#655c55</div></div><div class="swatch"><div class="chip" style="background:#aba199"></div><div class="meta">#aba199</div></div><div class="swatch"><div class="chip" style="background:#c8b7ad"></div><div class="meta">#c8b7ad</div></div><div class="swatch"><div class="chip" style="background:#93705a"></div><div class="meta">#93705a</div></div><div class="swatch"><div class="chip" style="background:#c89366"></div><div class="meta">#c89366</div></div><div class="swatch"><div class="chip" style="background:#cec3ba"></div><div class="meta">#cec3ba</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="The New Company desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="The New Company mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
