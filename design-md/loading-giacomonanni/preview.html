<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Giacomonanni Design Preview (Light)</title>
<style>
  :root {
    --bg: #dbdbdb;
    --fg: #141819;
    --accent: #5a625c;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: system-ui;
    --font-mono: ui-monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Loading Giacomonanni</h1>
        <p>A website that never stops loading.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://loading.giacomonanni.info/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/loading-giacomonanni">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>System UI</p>
        <div class="eyebrow">Tags</div>
        <p class="small">minimal · retro</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#dbdbdb"></div><div class="meta">#dbdbdb</div></div><div class="swatch"><div class="chip" style="background:#141819"></div><div class="meta">#141819</div></div><div class="swatch"><div class="chip" style="background:#5a625c"></div><div class="meta">#5a625c</div></div><div class="swatch"><div class="chip" style="background:#9fa5a0"></div><div class="meta">#9fa5a0</div></div><div class="swatch"><div class="chip" style="background:#196919"></div><div class="meta">#196919</div></div><div class="swatch"><div class="chip" style="background:#a25352"></div><div class="meta">#a25352</div></div><div class="swatch"><div class="chip" style="background:#3b5142"></div><div class="meta">#3b5142</div></div><div class="swatch"><div class="chip" style="background:#ceafae"></div><div class="meta">#ceafae</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Loading Giacomonanni desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Loading Giacomonanni mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
