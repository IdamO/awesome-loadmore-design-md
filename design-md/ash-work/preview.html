<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ash Work Design Preview (Light)</title>
<style>
  :root {
    --bg: #5c6629;
    --fg: #181914;
    --accent: #646e4b;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: Univers LT Std;
    --font-mono: ui-monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Ash Work</h1>
        <p>Play with the focus of a CGI image.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://ash.work/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/ash-work">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>Univers LT Std</p>
        <div class="eyebrow">Tags</div>
        <p class="small">portfolio · 3d</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#5c6629"></div><div class="meta">#5c6629</div></div><div class="swatch"><div class="chip" style="background:#181914"></div><div class="meta">#181914</div></div><div class="swatch"><div class="chip" style="background:#646e4b"></div><div class="meta">#646e4b</div></div><div class="swatch"><div class="chip" style="background:#8d955f"></div><div class="meta">#8d955f</div></div><div class="swatch"><div class="chip" style="background:#798450"></div><div class="meta">#798450</div></div><div class="swatch"><div class="chip" style="background:#77842f"></div><div class="meta">#77842f</div></div><div class="swatch"><div class="chip" style="background:#a3a692"></div><div class="meta">#a3a692</div></div><div class="swatch"><div class="chip" style="background:#3b441f"></div><div class="meta">#3b441f</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Ash Work desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Ash Work mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
