<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yaeji Design Preview (Light)</title>
<style>
  :root {
    --bg: #e2dcd3;
    --fg: #59585f;
    --accent: #1b1d2a;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: 5final;
    --font-mono: RadioGrotesk;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Yaeji</h1>
        <p>Yaeji is cool. Her website is very cute and comes with a drawing tool.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="http://yaeji.com/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/yaeji">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>5final<br>RadioGrotesk</p>
        <div class="eyebrow">Tags</div>
        <p class="small">music · illustration · retro</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#e2dcd3"></div><div class="meta">#e2dcd3</div></div><div class="swatch"><div class="chip" style="background:#59585f"></div><div class="meta">#59585f</div></div><div class="swatch"><div class="chip" style="background:#1b1d2a"></div><div class="meta">#1b1d2a</div></div><div class="swatch"><div class="chip" style="background:#a49996"></div><div class="meta">#a49996</div></div><div class="swatch"><div class="chip" style="background:#333845"></div><div class="meta">#333845</div></div><div class="swatch"><div class="chip" style="background:#946f5e"></div><div class="meta">#946f5e</div></div><div class="swatch"><div class="chip" style="background:#c7b3a7"></div><div class="meta">#c7b3a7</div></div><div class="swatch"><div class="chip" style="background:#ad8a72"></div><div class="meta">#ad8a72</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Yaeji desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Yaeji mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
