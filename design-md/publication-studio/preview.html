<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Publication Studio Design Preview (Light)</title>
<style>
  :root {
    --bg: #8aa8d4;
    --fg: #7b9acb;
    --accent: #9cadba;
    --card: #ffffff;
    --border: rgba(17,17,17,0.12);
    --font-sans: system-ui;
    --font-mono: ui-monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #ffffff; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Publication Studio</h1>
        <p>Browsing clouds of floating publications.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://publicationstudio.cloud">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/publication-studio">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>System UI</p>
        <div class="eyebrow">Tags</div>
        <p class="small">arts&culture · online-magazine</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#8aa8d4"></div><div class="meta">#8aa8d4</div></div><div class="swatch"><div class="chip" style="background:#7b9acb"></div><div class="meta">#7b9acb</div></div><div class="swatch"><div class="chip" style="background:#9cadba"></div><div class="meta">#9cadba</div></div><div class="swatch"><div class="chip" style="background:#abc1e4"></div><div class="meta">#abc1e4</div></div><div class="swatch"><div class="chip" style="background:#5f7294"></div><div class="meta">#5f7294</div></div><div class="swatch"><div class="chip" style="background:#738cb4"></div><div class="meta">#738cb4</div></div><div class="swatch"><div class="chip" style="background:#4a5a77"></div><div class="meta">#4a5a77</div></div><div class="swatch"><div class="chip" style="background:#3c4861"></div><div class="meta">#3c4861</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Publication Studio desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Publication Studio mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
