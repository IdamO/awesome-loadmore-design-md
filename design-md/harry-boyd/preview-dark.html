<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harry Boyd Design Preview (Dark)</title>
<style>
  :root {
    --bg: #0f0f10;
    --fg: #f7f7f7;
    --accent: #b6b8b6;
    --card: #18181b;
    --border: rgba(255,255,255,0.12);
    --font-sans: Acid Grotesk;
    --font-mono: Aether;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #0a0a0a; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Harry Boyd</h1>
        <p>Interacting with elastic shapes on mobile is very satistifying.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="http://www.harryboyd.co.uk/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/harry-boyd">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>Acid Grotesk<br>Aether</p>
        <div class="eyebrow">Tags</div>
        <p class="small">portfolio · tactile · clean-ui</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#e4e4e4"></div><div class="meta">#e4e4e4</div></div><div class="swatch"><div class="chip" style="background:#d2d2d2"></div><div class="meta">#d2d2d2</div></div><div class="swatch"><div class="chip" style="background:#b6b8b6"></div><div class="meta">#b6b8b6</div></div><div class="swatch"><div class="chip" style="background:#bdc0be"></div><div class="meta">#bdc0be</div></div><div class="swatch"><div class="chip" style="background:#bec2c0"></div><div class="meta">#bec2c0</div></div><div class="swatch"><div class="chip" style="background:#cdc7b3"></div><div class="meta">#cdc7b3</div></div><div class="swatch"><div class="chip" style="background:#e2b22c"></div><div class="meta">#e2b22c</div></div><div class="swatch"><div class="chip" style="background:#efce78"></div><div class="meta">#efce78</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Harry Boyd desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Harry Boyd mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
