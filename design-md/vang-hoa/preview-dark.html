<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vàng Hoa Design Preview (Dark)</title>
<style>
  :root {
    --bg: #0f0f10;
    --fg: #f7f7f7;
    --accent: #6b644e;
    --card: #18181b;
    --border: rgba(255,255,255,0.12);
    --font-sans: Alegreya;
    --font-mono: Work Sans;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    line-height: 1.5;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 40px 20px 80px; }
  .hero { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; align-items: start; }
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 24px;
  }
  .eyebrow { font-size: 12px; letter-spacing: .14em; text-transform: uppercase; opacity: .72; }
  h1 { font-size: clamp(40px, 7vw, 84px); line-height: .96; margin: 10px 0 16px; }
  p { max-width: 62ch; }
  .buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 24px; }
  .btn {
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 12px 18px;
    text-decoration: none;
    color: inherit;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn--accent { background: var(--accent); color: #0a0a0a; border-color: transparent; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px; }
  .swatch { border-radius: 18px; overflow: hidden; border: 1px solid var(--border); }
  .swatch .chip { height: 82px; }
  .swatch .meta { padding: 12px 14px; font-family: var(--font-mono); font-size: 12px; }
  .shots { display: grid; grid-template-columns: 1fr 320px; gap: 20px; margin-top: 28px; }
  img { width: 100%; display: block; border-radius: 18px; border: 1px solid var(--border); }
  .small { font-size: 13px; opacity: .72; }
  @media (max-width: 900px) {
    .hero, .shots, .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="panel">
        <div class="eyebrow">loadmo.re design archive</div>
        <h1>Vàng Hoa</h1>
        <p>The essence of what we call a 'Tatile Interactive Website'.</p>
        <div class="buttons">
          <a class="btn btn--accent" href="https://vanghoa.github.io/">Visit live site</a>
          <a class="btn" href="https://loadmo.re/posts/vang-hoa">Open loadmo.re entry</a>
        </div>
      </div>
      <div class="panel">
        <div class="eyebrow">Fonts</div>
        <p>Alegreya<br>Work Sans</p>
        <div class="eyebrow">Tags</div>
        <p class="small">tactile · portfolio</p>
      </div>
    </section>

    <section class="grid">
      <div class="swatch"><div class="chip" style="background:#5b4a34"></div><div class="meta">#5b4a34</div></div><div class="swatch"><div class="chip" style="background:#342f25"></div><div class="meta">#342f25</div></div><div class="swatch"><div class="chip" style="background:#6b644e"></div><div class="meta">#6b644e</div></div><div class="swatch"><div class="chip" style="background:#f5f5f5"></div><div class="meta">#f5f5f5</div></div><div class="swatch"><div class="chip" style="background:#9a8a6d"></div><div class="meta">#9a8a6d</div></div><div class="swatch"><div class="chip" style="background:#48392a"></div><div class="meta">#48392a</div></div><div class="swatch"><div class="chip" style="background:#a29b92"></div><div class="meta">#a29b92</div></div><div class="swatch"><div class="chip" style="background:#887558"></div><div class="meta">#887558</div></div>
    </section>

    <section class="shots">
      <div class="panel">
        <div class="eyebrow">Web capture</div>
        <img alt="Vàng Hoa desktop" src="./screenshots/desktop.jpg">
      </div>
      <div class="panel">
        <div class="eyebrow">Mobile capture</div>
        <img alt="Vàng Hoa mobile" src="./screenshots/mobile.jpg">
      </div>
    </section>
  </div>
</body>
</html>
